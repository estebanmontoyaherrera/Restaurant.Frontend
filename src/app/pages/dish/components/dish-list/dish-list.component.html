<div
  class="max-w-screen-160 mx-auto h-full flex flex-col px-10 py-6 gap-4 mt-6"
>
  <div class="flex justify-between flex-wrap gap-4">
    <div class="flex items-center">
      <mat-icon
        @scaleIn
        class="text-2xl text-am-main-blue"
        [fontIcon]="iconDish$"
      >
      </mat-icon>
      <div
        @fadeInRight
        class="text-3xl font-medium italic text-am-main-blue-dark ml-2"
      >
        Platos
      </div>
    </div>
    <div class="flex flex-wrap gap-2 items-center justify-end w-full sm:w-auto">
      <app-search-box
        [searchOptions]="componentDish$.searchOptions"
        (search)="search($event)"
        [currentValue]="componentDish$.filters.category"
      />
      <app-export-excel
        [url]="getDownloadUrlExcel"
        [getInputs]="componentDish$.getInputs"
        [filename]="componentDish$.filename"
      />
      <app-export-pdf
        [url]="getDownloadUrlPdf"
        [getInputs]="componentDish$.getInputs"
        [filename]="componentDish$.filename"
      />
    </div>
  </div>
  <div class="flex gap-2 justify-between flex-wrap">
    <div class="flex gap-2 items-end flex-wrap">
      <div>
        <app-filter-menu-states
          [menuFilter]="componentDish$.menuItems"
          [initfilters]="componentDish$.filters.stateFilter"
          [reset]="resetChecks"
          (dataChecked)="setDataFilterStates($event)"
        />
      </div>
      <div>
        <app-split-button
          [configButtons]="componentDish$.filterButtons"
          (doThisFunction)="resetButton($event)"
        />
      </div>
    </div>
    <div class="flex gap-2 items-end">
      <app-generic-button
        [infoButton]="componentDish$.actionButtonDish"
        (clickButton)="newDish()"
      />
    </div>
  </div>
  <div class="card h-full shadow-xl rounded-3xl overflow-hidden flex-auto">
    <app-list-table
      (rowClick)="rowClick($event)"
      [service]="dishService"
      [columns]="componentDish$.tableColumns"
      [sortBy]="componentDish$.initialSort"
      [sortDir]="componentDish$.initalSortDir"
      [getInputs]="componentDish$.getInputs"
    />
  </div>
</div>

<ngx-spinner
  [fullScreen]="true"
  bdColor="rgb(70, 84, 153, 0.3)"
  size="medium"
  name="carga"
  color="#7084E3"
  type="ball-clip-rotate-pulse"
>
</ngx-spinner>
<form [formGroup]="user">
  <h2 mat-dialog-title>
    <strong class="text-am-main-blue-dark">
      {{ data.mode == "create" ? "Nuevo usuario" : "Actualizar usuario" }}
    </strong>
  </h2>
  <mat-dialog-content>
    <gs-text
      label="Nombres"
      [mode]="mode"
      [inputControl]="user.get('firstName')"
    />
    <gs-text
      label="Apellidos"
      [mode]="mode"
      [inputControl]="user.get('lastName')"
    />
    <gs-text label="Email" [mode]="mode" [inputControl]="user.get('email')" />
    <gs-text label="Password" [mode]="mode" [inputControl]="user.get('password')" />
    <gs-select
      label="Estado"
      [mode]="mode"
      placeholder="Seleccionar estado"
      [aOptions]="states$"
      [inputControl]="user.get('state')"
    />
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button mat-dialog-close>Cancelar</button>
    <button
      mat-button
      [class]="{ 'cursor-not-allowed': !user.valid }"
      (click)="user.valid ? userSave() : user.markAllAsTouched()"
    >
      Guardar
    </button>
  </mat-dialog-actions>
</form>
